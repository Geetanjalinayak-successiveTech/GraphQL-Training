type Query {
  messages: [Message!]!
  getUsers: [User!]!
  getUserById(id: ID!): User
  getPosts: [Post!]!
  getPostById(id: ID!): Post
  getPostsByUserId(userId: ID!): [Post!]!
  getComments: [Comment!]!
  getCommentsByPostId(postId: ID!): [Comment!]!
  getUserByComment(comment: CommentInput!): User
  getAuthorOfPost(post: PostInput!): User
  paginatedPosts(page: Int!, limit: Int!, sortOrder: sortOrder): [Post!]! 
 

}

type Mutation {
  postMessage(content: String!, author: String!, title: String!): Message!
  createPost(title: String!, content: String!, authorId: ID!): Post!
  updateUser(id: ID!, name: String, email: String!): User!
  deleteComment(id: ID!): Comment!
  createComment(text:String!,postId:ID!):Comment!
}

input CommentInput {
  id: ID!
  text: String!
  postId: ID!
  userId: ID!
}

input PostInput {
  id: ID!
  title: String!
  content: String!
  authorId: ID!
}
